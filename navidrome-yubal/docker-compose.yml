services:
  yubal:
    image: ghcr.io/guillevc/yubal:latest
    container_name: yubal
    user: 1000:1000
    ports:
      - 8245:8000
    environment:
      YUBAL_SCHEDULER_CRON: "0 0 * * *"
      YUBAL_DOWNLOAD_UGC: false
      YUBAL_TZ: Europe/Paris
    volumes:
      - /mnt/ssd_crucial/media/music:/app/data
      - ./yubal/config:/app/config
    restart: unless-stopped

  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    user: 1000:1000
    ports:
      - "4533:4533"
    restart: unless-stopped
    environment:
      ND_MUSICFOLDER: /music
      ND_DATAFOLDER: /data
      ND_LOGLEVEL: info
      ND_PLUGINS_ENABLED: "true"
      ND_PLUGINS_AUTORELOAD: "true"
      ND_AGENTS: audiomuseai,lastfm,spotify,deezer
      ND_DEVARTISTINFOTIMETOLIVE: 1s
    volumes:
      - ./navidrome:/data
      - /mnt/ssd_crucial/media/music:/music:ro

